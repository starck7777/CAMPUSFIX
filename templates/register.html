{% extends 'base.html' %}

{% block content %}
<section class="panel form-panel">
    <h1>Create Account</h1>
    <p>Create new login credentials for either the admin portal or the student portal.</p>

    <form method="post" class="issue-form login-form">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Choose a username" required>

        <label for="role">Account Type</label>
        <select id="role" name="role" required>
            <option value="">Choose one...</option>
            <option value="student">Student</option>
            <option value="admin">Admin</option>
        </select>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <label for="confirm_password">Confirm Password</label>
        <input id="confirm_password" name="confirm_password" type="password" required>

        <button class="btn" type="submit">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a>.</p>
</section>
{% endblock %}
