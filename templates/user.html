<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusFix - User</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <h1>CampusFix</h1>
    <p class="subtitle">Submit campus problems directly to the maintenance team.</p>

    <nav class="nav">
      <a href="/">User</a>
      <a href="/admin">Admin</a>
    </nav>

    <form id="issueForm" class="card">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" required />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required />

      <label for="category">Category</label>
      <select id="category" name="category" required>
        <option value="">Select</option>
        <option>Electrical</option>
        <option>Water Supply</option>
        <option>Hostel</option>
        <option>Classroom</option>
        <option>Security</option>
        <option>Other</option>
      </select>

      <label for="location">Location</label>
      <input id="location" name="location" type="text" required />

      <label for="description">Description</label>
      <textarea id="description" name="description" rows="5" required></textarea>

      <button type="submit">Submit Issue</button>
      <p id="statusMsg" class="status"></p>
    </form>
  </main>

  <script src="{{ url_for('static', filename='user.js') }}"></script>
</body>
</html>
