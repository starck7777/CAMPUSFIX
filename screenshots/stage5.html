<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CampusFix - Stage 5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }
        nav {
            background: #444;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .stat {
            text-align: center;
            background: #e9ecef;
            padding: 10px;
            border-radius: 4px;
        }
        form {
            margin-top: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <header>
        <h1>CampusFix</h1>
    </header>
    <nav>
        <a href="#dashboard">Dashboard</a>
        <a href="#report">Report Issue</a>
        <a href="#issues">View Issues</a>
    </nav>
    <div class="container">
        <section id="dashboard">
            <h2>Dashboard</h2>
            <div class="stats">
                <div class="stat">
                    <h3>Total Issues</h3>
                    <p>2</p>
                </div>
                <div class="stat">
                    <h3>Open</h3>
                    <p>1</p>
                </div>
                <div class="stat">
                    <h3>In Progress</h3>
                    <p>1</p>
                </div>
                <div class="stat">
                    <h3>Resolved</h3>
                    <p>0</p>
                </div>
            </div>
        </section>

        <section id="report">
            <h2>Report an Issue</h2>
            <form>
                <label for="title">Issue Title:</label>
                <input type="text" id="title" name="title" required>

                <label for="category">Category:</label>
                <select id="category" name="category">
                    <option>Classroom</option>
                    <option>Facility</option>
                    <option>Other</option>
                </select>

                <label for="location">Location:</label>
                <input type="text" id="location" name="location" required>

                <label for="description">Description:</label>
                <textarea id="description" name="description" rows="4" required></textarea>

                <button type="submit">Submit Issue</button>
            </form>
        </section>

        <section id="issues">
            <h2>Reported Issues</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Category</th>
                        <th>Location</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Broken projector</td>
                        <td>Classroom</td>
                        <td>Room 101</td>
                        <td>Open</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Leaky faucet</td>
                        <td>Facility</td>
                        <td>Bathroom A</td>
                        <td>In Progress</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>
