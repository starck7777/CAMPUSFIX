services:
  - type: web
    name: campusfix
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: CAMPUSFIX_DATA_DIR
        value: /var/data
    disks:
      - name: campusfix-data
        mountPath: /var/data
        sizeGB: 1
